apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe --file docker-compose.yaml convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: caddy
  name: caddy
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: caddy
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe --file docker-compose.yaml convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: caddy
    spec:
      containers:
        - image: caddy
          name: caddy
          ports:
            - containerPort: 80
              protocol: TCP
            - containerPort: 443
              protocol: TCP
            - containerPort: 443
              protocol: UDP
            - containerPort: 2019
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/caddy
              name: magic-caddy-config
            - mountPath: /data
              name: magic-caddy-data
            - mountPath: /config
              name: magic-caddy-conf
      restartPolicy: Always
      volumes:
        - name: magic-caddy-config
          persistentVolumeClaim:
            claimName: magic-caddy-config
        - name: magic-caddy-data
          persistentVolumeClaim:
            claimName: magic-caddy-data
        - name: magic-caddy-conf
          persistentVolumeClaim:
            claimName: magic-caddy-conf
